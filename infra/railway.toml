# Railway deployment config — two services, both rooted at /backend.
# In the Railway dashboard, create two services from this repo:
#   1. "api"    — root directory: backend, start: node dist/index.js
#   2. "worker" — root directory: backend, start: node dist/worker/index.js
# Both share the same build command. The worker service should have a
# persistent volume mounted at /data and DB_PATH=/data/localfeed.db.

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

# --- API service ---
[environments.production.deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Worker service ---
# Duplicate this file in the Railway dashboard's worker service config
# and override startCommand to: node dist/worker/index.js
