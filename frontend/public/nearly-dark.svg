<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120" role="img">
  <title>nearly. dark variant</title>
  <desc>nearly. logo — icon with wordmark, dark background version</desc>

  <!-- Dark background -->
  <rect width="400" height="120" rx="14" fill="#0D1F1A"/>

  <!-- Icon -->
  <circle cx="64" cy="60" r="44" fill="#1D9E75"/>
  <path d="M64 24 C50 24 40 34 40 46 C40 62 64 84 64 84 C64 84 88 62 88 46 C88 34 78 24 64 24 Z"
        fill="#E1F5EE"/>
  <circle cx="64" cy="45" r="8.5" fill="#1D9E75"/>
  <path d="M46 30 Q32 47 46 64" fill="none" stroke="#5DCAA5" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M82 30 Q96 47 82 64" fill="none" stroke="#5DCAA5" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M37 22 Q19 47 37 72" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M91 22 Q109 47 91 72" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="126" y="68"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48"
        font-weight="700"
        letter-spacing="-1.5"
        fill="#E1F5EE">nearly</text>

  <!-- Teal dot -->
  <circle cx="384" cy="61" r="6" fill="#5DCAA5"/>

  <!-- Tagline -->
  <text x="127" y="92"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3"
        fill="#5DCAA5">YOUR CITY. DAILY.</text>
</svg>
