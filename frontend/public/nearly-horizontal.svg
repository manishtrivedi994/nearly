  <circle cx="40" cy="27" r="7" fill="#0F6E56"/>
  <path d="M23 12 Q11 28 23 44" fill="none" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M57 12 Q69 28 57 44" fill="none" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M14 4 Q-2 28 14 52" fill="none" stroke="#9FE1CB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M66 4 Q82 28 66 52" fill="none" stroke="#9FE1CB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

